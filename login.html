<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniversário da Livia</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body class="guest-login-page">
    <div class="login-container">
      <h1>Livia</h1>
      <p>Digite seu código de convite</p>
      <form id="loginForm" class="login-form">
        <input
          type="text"
          id="inviteCode"
          placeholder="Digite aqui"
          required
        />
        <div
          id="guestCaptcha"
          class="captcha-container"
          aria-label="Validação de segurança"
          hidden
        ></div>
        <button type="submit">Entrar</button>
      </form>
      <div id="loginError"></div>
      <a class="login-secondary-link" href="admin-login.html">
        Acesso Administrativo
      </a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/captcha-config.js"></script>
    <script src="js/turnstile-captcha.js"></script>
    <script src="js/guest-auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guest-auth.js"></script>
    <script src="js/reference-decorations.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
